{% extends "layout.html" %}

{% block body %}
<div class="container mt-4">
    <h2>Push Task: {{ task.title }}</h2>
    <p class="text-muted">Duration: {{ task.duration | format_duration }}</p>
    <form action="{{ url_for('push_task', task_id=task.id) }}" method="post" class="mt-3">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="scheduled_date" class="form-label">New Date</label>
                <input type="date" name="scheduled_date" id="scheduled_date" class="form-control" value="{{ task.scheduled_date }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="scheduled_time" class="form-label">New Time</label>
                <input type="time" name="scheduled_time" id="scheduled_time" class="form-control" value="{{ task.scheduled_time }}" required>
            </div>
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Update Schedule</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
