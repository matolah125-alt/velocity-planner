{% extends "layout.html" %}

{% block body %}
<div class="container mt-4">
    <h2>Add New Task</h2>
    <form action="/add" method="post" class="mt-3">
        <div class="mb-3">
            <label for="title" class="form-label">Task Title</label>
            <input type="text" name="title" id="title" class="form-control" required>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="duration" class="form-label">Duration (hours)</label>
                <input type="number" name="duration" id="duration" class="form-control" step="1" min="1" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="priority" class="form-label">Priority (1-5)</label>
                <select name="priority" id="priority" class="form-control" required>
                    <option value="1">1 (Low)</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5 (High)</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="scheduled_date" class="form-label">Schedule Date (Optional)</label>
                <input type="date" name="scheduled_date" id="scheduled_date" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label for="scheduled_time" class="form-label">Schedule Time (Optional)</label>
                <input type="time" name="scheduled_time" id="scheduled_time" class="form-control" value="08:00">
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Add Task</button>
    </form>
</div>
{% endblock %}
