<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script>
        // Apply theme immediately to prevent white flash
        const storedTheme = localStorage.getItem('theme');
        const theme = storedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-bs-theme', theme);
    </script>
</head>
<body>
    <nav class="container mt-3 d-flex justify-content-between align-items-center">
        <div>
        {% if session.user_id %}
            <a href="/">Daily Plan</a> | 
            <a href="/add">Add Task</a> | 
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a> | 
            <a href="/register">Register</a>
        {% endif %}
        </div>
        <button id="themeToggle" class="btn btn-sm btn-outline-secondary">🌓 Toggle Mode</button>
    </nav>
    <div class="container">
        <hr>
    </div>
    <main class="container">
        {% block body %}{% endblock %}
    </main>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
